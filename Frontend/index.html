<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Meeting Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="auth-section" class="login-overlay">
    <div class="login-box">
      <div class="logo-mark">&#9889;</div>
      <h1>AI Task Board</h1>
      <p id="auth-title">Smart meeting task extraction</p>
      <input type="text" id="auth-name" placeholder="Enter your name" />
      <input type="email" id="auth-email" placeholder="Enter your email" />
      <input type="password" id="auth-password" placeholder="Enter your password" />
      <input type="text" id="auth-role" placeholder="Role / Team (optional)" />
      <button id="btn-auth">Login</button>
      <button id="btn-switch-auth" class="btn-secondary">Need account? Register</button>
      <span id="auth-error" class="login-error"></span>
    </div>
  </div>
  <div id="main-app">
    <header class="topbar">
      <div class="topbar-left"><span class="app-logo">&#9889; AI Task Board</span></div>
      <div class="topbar-right">
        <span id="user-display"></span>
        <input type="text" id="search-input" placeholder="Search tasks..." />
        <button id="btn-logout" class="btn-secondary">Logout</button>
      </div>
    </header>
    <section class="input-panel">
      <div class="input-row">
        <div class="input-group transcript-group">
          <label>Paste Meeting Transcript</label>
          <textarea id="transcript" placeholder="Paste your full meeting notes here..."></textarea>
        </div>
        <div class="input-group identity-group">
          <label>Who are you in this meeting?</label>
          <input type="text" id="meeting-identity" placeholder="e.g. Priya" />
          <p class="hint">This helps find YOUR tasks from the transcript</p>
          <button id="btn-analyze" class="btn-primary">Analyze Transcript</button>
          <button id="btn-reset" class="btn-secondary">Reset Board</button>
        </div>
      </div>
    </section>
    <div class="stats-bar">
      <div class="stat-chip">All Tasks: <strong id="count-all">0</strong></div>
      <div class="stat-chip">My Tasks: <strong id="count-mine">0</strong></div>
      <div class="stat-chip">Done: <strong id="count-done">0</strong></div>
    </div>
    <main class="board">
      <div class="column"><div class="col-header col-all">All Tasks</div><div class="task-list" id="col-all"></div></div>
      <div class="column"><div class="col-header col-mine">My Tasks</div><div class="task-list" id="col-mine"></div></div>
      <div class="column"><div class="col-header col-done">Done</div><div class="task-list" id="col-done"></div></div>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script src="js/parser.js"></script>
  <script src="js/ui.js"></script>
  <script src="script.js"></script>
</body>
</html>
